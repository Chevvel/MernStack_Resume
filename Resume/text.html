<!DOCTYPE html>
<html>

<head>
	<title>Form</title>
	<style>
		#form {
			height: 280px;
			width: 320px;
			display: flex;
			align-items: center;
			background-color: transparent;
			border: 4px solid blue;
			/* border-left: 5px solid blue;
			border-right: 7px solid yellow; */
			box-shadow: 2px 2px 20px red;
			border-radius: 10px;
			font-family: monospace;
			padding-left: 10px;
		}
	</style>
</head>
<center>

	<body style="background-color: aliceblue;
				 display:flex;
				 justify-content: center;
				 align-items: center;
				 height:100vh">
		<div id="form">
			<form>
				<table>
					<tr>
						<td><label>Name: </label></td>
						<td><input type="name" placeholder="Enter your name" required></td>
					</tr>

					<tr>
						<td><label>Roll No: </label></td>
						<td><input type="text" placeholder="Enter your Roll No" required></td>
					</tr>

					<tr>
						<td><label>DOB: </label></td>
						<td><input type="date" required></td>
					</tr>

					<tr>
						<td><label>Age: </label></td>
						<td><input type="number" placeholder="Enter your Age" required></td>
					</tr>

					<tr>
						<td><label for="gender">Gender</label></td>
						<td><input type="radio" name="gen" id="male">
							<label for="male">Male</label>
							<input type="radio" name="gen" id="female">
							<label for="female">Female</label>
							<input type="radio" name="gen">Other
						</td>
					</tr>

					<tr>
						<td><label>Email: </label></td>
						<td><input type="email" placeholder="ok@gmail.com"></td>
					</tr>

					<tr>
						<td><label>Password: </label></td>
						<td><input type="password" placeholder="Enter your Password"></td>
					</tr>

					<tr>
						<td><label>Department: </label></td>
						<td><input type="text" placeholder="Enter your department" required></td>
					</tr>

					<tr>
						<td><button type="button" onclick="location.href='index.html'" Target="_blank">Home</button></td>
						<td><button type="submit">Submit</button></td>
					</tr>
				</table>

				<!-- <label>try: </label>
			<input type="text" placeholder="try something" required>
			<br>
			<button type="submit">Submit</button> -->
			</form>

		</div>
	</body>
</center>

</html>
